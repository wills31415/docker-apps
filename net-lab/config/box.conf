# ============================================================
#  net-lab — Configuration de la BOX  ("l'IHM")
#
#  C'est l'équivalent de l'interface http://192.168.1.1 d'une
#  vraie box : le SEUL moyen d'agir sur le routeur.
#
#  Appliquer les changements :
#    ./box-apply.sh      → recharge À CHAUD la DMZ + les redirections
#    ./box-status.sh     → affiche l'état courant (comme ouvrir l'IHM)
#
#  Les sections marquées [STRUCTUREL] (sous-réseaux, IP publique,
#  baux) ne sont PAS rechargeables à chaud → nécessitent : da restart
# ============================================================

# ── [STRUCTUREL] Plan d'adressage ─────────────────────────────
# La box est toujours la passerelle .1 du LAN et de la DMZ.
# WAN = plage de documentation RFC5737 (jamais routable sur Internet).
WAN_SUBNET="203.0.113.0/24"
LAN_SUBNET="192.168.1.0/24"
DMZ_SUBNET="192.168.2.0/24"

# IP publique fixe de la box (reproductible).
PUBLIC_IP="203.0.113.2"

# ── [STRUCTUREL] Baux statiques  "nom:ip" ─────────────────────
# Épingle l'IP d'une machine. Les machines absentes de cette liste
# reçoivent une IP auto-assignée depuis le sous-réseau de leur rôle.
LEASES=(
  "gateway:192.168.1.10"
  "server-1:192.168.1.20"
  "nas:192.168.2.10"
)

# ── Machine isolée en DMZ (rechargeable) ──────────────────────
# Doit être une machine du sous-réseau DMZ (le NAS).
DMZ_HOST="nas"

# ── Redirections de ports (rechargeable à chaud) ──────────────
# Format : "proto:port_public:machine_cible:port_cible"
#   proto ∈ {tcp, udp}
# Le trafic arrivant sur PUBLIC_IP:port_public est redirigé (DNAT)
# vers machine_cible:port_cible.
FORWARDS=(
  "tcp:2222:gateway:22"     # SSH → gateway ("entrée des artistes")
  "tcp:2022:nas:22"         # SSH → NAS (DMZ)
  "tcp:8080:nas:8080"       # HTTP démo → NAS (DMZ)
)
