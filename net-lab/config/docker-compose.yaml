# ============================================================
# AUTO-GÉNÉRÉ par pre-up.sh — NE PAS MODIFIER À LA MAIN
# Éditez config/topology.conf ou config/box.conf puis :
#   da restart net-lab
# ============================================================

networks:

  # WAN : "Internet". IP publique de la box + clients extérieurs.
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
          gateway: 203.0.113.1

  # LAN : réseau domestique (gateway + servers). Box = 192.168.1.1.
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.254

  # DMZ : segment isolé du NAS. Box = 192.168.2.1.
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.254

services:

  # ── BOX (routeur NAT / pare-feu) ────────────────────────────
  box:
    build:
      context: ./box
    container_name: net-lab-box
    hostname: box
    networks:
      wan:
        ipv4_address: 203.0.113.2
      lan:
        ipv4_address: 192.168.1.1
      dmz:
        ipv4_address: 192.168.2.1
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      - HOSTMAP=gateway=192.168.1.10;server-1=192.168.1.20;server-2=192.168.1.21;nas=192.168.2.10;client-1=203.0.113.101;client-2=203.0.113.102
    volumes:
      - ../shared/box/box.conf:/etc/net-lab/box.conf:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  # ── GATEWAY (LAN, entrée des artistes) ──────────────────────

  gateway:
    build:
      context: ./node
    container_name: net-lab-gateway
    hostname: gateway
    networks:
      lan:
        ipv4_address: 192.168.1.10
    environment:
      - NODE_ROLE=gateway
      - NODE_NAME=gateway
      - BOX_GW_IP=192.168.1.1
      - EGRESS_VIA_BOX=0
      - DMZ_SUBNET=192.168.2.0/24
      - BOX_LAN_IP=192.168.1.1
    cap_add:
      - NET_ADMIN
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/gateway:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  # ── SERVERS (LAN) ───────────────────────────────────────────

  server-1:
    build:
      context: ./node
    container_name: net-lab-server-1
    hostname: server-1
    networks:
      lan:
        ipv4_address: 192.168.1.20
    environment:
      - NODE_ROLE=server
      - NODE_NAME=server-1
      - BOX_GW_IP=192.168.1.1
      - EGRESS_VIA_BOX=0
      - DMZ_SUBNET=192.168.2.0/24
      - BOX_LAN_IP=192.168.1.1
    cap_add:
      - NET_ADMIN
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/servers:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  server-2:
    build:
      context: ./node
    container_name: net-lab-server-2
    hostname: server-2
    networks:
      lan:
        ipv4_address: 192.168.1.21
    environment:
      - NODE_ROLE=server
      - NODE_NAME=server-2
      - BOX_GW_IP=192.168.1.1
      - EGRESS_VIA_BOX=0
      - DMZ_SUBNET=192.168.2.0/24
      - BOX_LAN_IP=192.168.1.1
    cap_add:
      - NET_ADMIN
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/servers:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  # ── NAS (DMZ) ───────────────────────────────────────────────

  nas:
    build:
      context: ./node
    container_name: net-lab-nas
    hostname: nas
    networks:
      dmz:
        ipv4_address: 192.168.2.10
    environment:
      - NODE_ROLE=nas
      - NODE_NAME=nas
      - BOX_GW_IP=192.168.2.1
      - EGRESS_VIA_BOX=0
    cap_add:
      - NET_ADMIN
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/nas:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  # ── CLIENTS (WAN) ───────────────────────────────────────────

  client-1:
    build:
      context: ./node
    container_name: net-lab-client-1
    hostname: client-1
    networks:
      wan:
        ipv4_address: 203.0.113.101
    environment:
      - NODE_ROLE=client
      - NODE_NAME=client-1
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/clients:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

  client-2:
    build:
      context: ./node
    container_name: net-lab-client-2
    hostname: client-2
    networks:
      wan:
        ipv4_address: 203.0.113.102
    environment:
      - NODE_ROLE=client
      - NODE_NAME=client-2
    volumes:
      # Script d'entrée bind-monté depuis l'hôte (itération sans --build).
      - ../config/node/entrypoint.sh:/net-lab/entrypoint.sh:ro
      # Runtime config hot-tunable (lue en phase 1 ; reprovision la régénère
      # puis re-trigger phase 1 ⇒ vraie propagation sans recreate).
      - ../shared/node/runtime.conf:/net-lab/runtime.conf:ro
      # Uploads partagés (host → conteneur, read-only).
      - ../shared/uploads/all:/uploads/all:ro
      - ../shared/uploads/clients:/uploads/role:ro
    restart: unless-stopped
    tty: true
    stdin_open: true

# Aucun volume nommé pour les nodes : la persistance vient du writable
# layer du conteneur (préservé par docker compose stop/start). Pour un
# fresh install : da down + da up --build (= conteneurs recréés).
