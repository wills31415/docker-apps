# ============================================================
#  net-lab — Topologie ("le matériel branché")
#
#  Décrit QUELLES machines existent. Pour configurer la box
#  (IP publique, baux, DMZ, redirections), voir box.conf.
#
#  Après modification : da restart net-lab
#  (changer le nombre de machines impose un restart)
# ============================================================

# ── Nombre de machines par rôle ───────────────────────────────
# nas=1 et gateway=1 sont FIXES (toujours présents, non listés ici).
N_SERVERS=2          # machines du LAN domestique  (0..N)
N_CLIENTS=2          # machines "sur le wifi public" / WAN (0..N)

# ── Authentification ──────────────────────────────────────────
# Mot de passe root injecté dans TOUTES les machines (pas la box).
# Aucune clé SSH n'est pré-distribuée : auth par mot de passe.
ROOT_PASSWORD=labpass

# ── Niveau de logs sshd ───────────────────────────────────────
#   QUIET | FATAL | ERROR | INFO | VERBOSE | DEBUG | DEBUG1 | DEBUG2 | DEBUG3
LOG_LEVEL=VERBOSE
