# =============================================================================
# Cluster : minecraft-server
# Services : Minecraft (itzg/minecraft-server)
# =============================================================================
# Rappel sur les chemins relatifs :
#   Ce fichier se trouve dans config/, donc "../shared/" pointe vers
#   le répertoire "minecraft-server/shared/" de l'hôte.
#
# Configuration :
#   Toute la configuration du serveur se fait dans le fichier .env
#   situé dans ce même répertoire. Modifier .env puis relancer :
#     da restart minecraft-server
#
# Documentation de l'image :
#   https://docker-minecraft-server.readthedocs.io
# =============================================================================

# =============================================================================
# RÉSEAUX
# Un réseau dédié isole le serveur Minecraft des autres containers Docker.
# =============================================================================
networks:
  minecraft_net:
    driver: bridge

# =============================================================================
# SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # SERVICE : minecraft
  # Image itzg/minecraft-server — https://hub.docker.com/r/itzg/minecraft-server
  # Serveur Minecraft hautement configurable via variables d'environnement.
  # ---------------------------------------------------------------------------
  minecraft:
    # Pin sur Java 21 LTS : itzg/minecraft-server:latest est passé à Java 25 (avril 2026)
    # ce qui casse les mods Fabric compilés contre Java 21 (crash silencieux au boot JVM).
    # `stable-java21` track les builds testés, plus prudent que `:java21` rolling.
    image: itzg/minecraft-server:stable-java21

    # Nom explicite du container (visible dans `docker ps`, utilisé par les hooks).
    container_name: minecraft_server

    # Redémarrage automatique sauf arrêt manuel.
    restart: unless-stopped

    # Nécessaire pour l'accès interactif à la console via `docker attach`.
    tty: true
    stdin_open: true

    # Charger toutes les variables de configuration depuis le fichier .env.
    # .env.local (gitignored, optionnel) permet d'overrider les valeurs de .env
    # pour des configs personnelles non-versionnées (OPS, RCON_PASSWORD, etc.).
    # Compose lit les fichiers dans l'ordre — le second écrase le premier.
    env_file:
      - .env
      - path: .env.local
        required: false

    # Variables critiques hardcodées ici (ne doivent jamais être retirées) :
    environment:
      # Acceptation obligatoire du CLUF Minecraft.
      # Sans cette variable, le container refuse de démarrer.
      EULA: "TRUE"

      # Permet aux variables d'environnement de piloter server.properties.
      # Sans cela, les variables comme DIFFICULTY, MODE, etc. sont ignorées.
      OVERRIDE_SERVER_PROPERTIES: "true"

    # Publication des ports sur l'hôte.
    #   - Port jeu : accessible depuis l'extérieur (pour les joueurs).
    #   - Port RCON : accessible sur le LAN (ne PAS ouvrir en NAT/PAT sur le routeur).
    #   - Port Dynmap : carte web (ouvrable en NAT/PAT sur le routeur).
    ports:
      - "${SERVER_PORT:-25565}:25565"
      - "${RCON_PORT:-25575}:25575"
      - "${DYNMAP_PORT:-25566}:8123"

    # Persistance des données du serveur (monde, mods, config, logs).
    # Tout le contenu de /data dans le container est sauvegardé dans shared/data/.
    volumes:
      - ../shared/data:/data

    # Contrôle de santé du serveur.
    # mc-health est un utilitaire intégré à l'image qui vérifie que le serveur
    # accepte des connexions Minecraft (Server List Ping).
    #
    # start_period élevé (5 min) car le premier démarrage avec un modpack
    # implique le téléchargement et l'installation de nombreux fichiers.
    healthcheck:
      test: mc-health
      start_period: 5m
      interval: 10s
      timeout: 5s
      retries: 30

    # Rattachement au réseau dédié du cluster.
    networks:
      - minecraft_net
