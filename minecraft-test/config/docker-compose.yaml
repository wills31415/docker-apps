# =============================================================================
# Cluster : minecraft-test (bac à sable Creative)
# Tourne en parallèle de minecraft-server sur des ports différents.
# Pas de Dynmap exposé. RCON sur localhost uniquement (admin via docker exec).
# =============================================================================

networks:
  minecraft_test_net:
    driver: bridge

services:
  minecraft-test:
    image: itzg/minecraft-server:stable-java21
    container_name: minecraft_test
    restart: unless-stopped
    tty: true
    stdin_open: true

    env_file:
      - .env
      - path: .env.local
        required: false

    environment:
      EULA: "TRUE"
      OVERRIDE_SERVER_PROPERTIES: "true"

    # 25567 hôte → 25565 container (port jeu, accessible LAN)
    # 127.0.0.1:25577 hôte → 25575 container (RCON, localhost-only)
    # 25570 hôte → 8123 container (Dynmap web map test, accessible LAN)
    ports:
      - "25567:25565"
      - "127.0.0.1:25577:25575"
      - "25570:8123"

    volumes:
      - ../shared/data:/data

    healthcheck:
      test: mc-health
      start_period: 5m
      interval: 10s
      timeout: 5s
      retries: 30

    networks:
      - minecraft_test_net

  # ---------------------------------------------------------------------------
  # SERVICE : nginx-static
  # Sert les fichiers de minecraft-server/shared/data/dynmap/web/ via HTTP sur
  # le port 25566 (même URL que la prod via Dynmap), pour que les clients
  # SteamDeck puissent curl le pack test + les scripts update-client*.sh
  # quand seul le cluster test tourne (prod down).
  # Pas de conflit de port car prod et test ne tournent jamais simultanément
  # (constraint mémoire — downscale obligatoire).
  # ---------------------------------------------------------------------------
  nginx-static:
    image: nginx:alpine
    container_name: minecraft_test_nginx
    restart: unless-stopped
    ports:
      - "25566:80"
    volumes:
      # Sert le même dossier que prod's Dynmap → mêmes URLs côté client.
      - ../../minecraft-server/shared/data/dynmap/web:/usr/share/nginx/html:ro
    networks:
      - minecraft_test_net
