# ============================================================
#  ssh-lab — Configuration du cluster
#  ✏️  C'est le SEUL fichier que vous devez éditer.
#
#  Après toute modification :
#      da restart ssh-lab         (si seul cluster.conf change)
#      da restart ssh-lab --build (si un Dockerfile / entrypoint change)
#
#  Note : la machine MASTER est indépendante de cette configuration.
#  Elle est toujours présente et n'est pas paramétrée ici.
# ============================================================

# ── Topologie ─────────────────────────────────────────────────
# Nombre de conteneurs par rôle (entier >= 1)
N_CLIENTS=3
N_GATEWAYS=1
N_SERVERS=2

# ── Ports SSH (accès depuis l'hôte vers les GATEWAYs) ─────────
# gateway-N → hôte:SSH_PORT_BASE+N
# Exemple avec 2220 : gateway-1 répond sur localhost:2221
SSH_PORT_BASE=2220

# ── Authentification ──────────────────────────────────────────
# Mot de passe root injecté dans tous les conteneurs au démarrage.
ROOT_PASSWORD=testpass

# Mot de passe de l'utilisateur 'admin' (sudo sans mot de passe).
# Utilisé pour se connecter en SSH avec : ssh admin@<hôte>
# Les commandes sudo ne demandent PAS ce mot de passe (NOPASSWD).
ADMIN_PASSWORD=adminpass

# ── Niveau de logs sshd ───────────────────────────────────────
# Valeurs valides (du plus silencieux au plus verbeux) :
#   QUIET | FATAL | ERROR | INFO | VERBOSE | DEBUG | DEBUG1 | DEBUG2 | DEBUG3
LOG_LEVEL=VERBOSE
